# Alembic Configuration for Persistence Schema Management

[alembic]
# Path to migration scripts
script_location = alembic

# SQLAlchemy connection URL (set via environment or will be read from app config)
# Supports env var SQLALCHEMY_URL or uses app defaults
sqlalchemy.url = sqlite:///./persistence.sqlite3

# Migration file template
sqlalchemy.echo = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
